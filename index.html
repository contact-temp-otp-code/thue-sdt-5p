<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quản trị hệ thống | Giải pháp số</title>
    <!-- 
        Mã nguồn này được tối ưu để:
        - Giữ nguyên URL "https://thue-sdt-5p.pages.dev/admin/" trên thanh địa chỉ.
        - Hiển thị nội dung hoàn toàn từ "https://contact-temp-otp-code.github.io/temp-otp-premium/admin.html" thông qua iframe.
        - Ẩn dấu vết iframe cực kỳ tinh vi, không thể phát hiện bằng công cụ thông thường (iframe chiếm full, không có đường viền, không cuộn, không hiển thị thuộc tính trong DOM?).
        - Sử dụng kỹ thuật "iframe giả lập trang đích" + xóa các thuộc tính gợi ý + khóa URL.
    -->
    <style>
        /* RESET CỰC KỲ TRIỆT ĐỂ: Xóa mọi margin, padding, cuộn */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: auto; /* giữ trải nghiệm bình thường */
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;       /* Không cho phép cuộn body, ẩn mọi thanh cuộn thừa */
            background: #0f172a;    /* Màu nền khớp với phong cách admin (có thể khớp với web đích) */
            position: fixed;
            top: 0;
            left: 0;
        }

        /* IFrame siêu ẩn - chiếm toàn bộ cửa sổ, không một đường viền hoặc bóng đổ nào */
        .stealth-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            margin: 0;
            padding: 0;
            display: block;
            background: #fff;
            z-index: 1;
            /* Không cho phép kéo thả hoặc tạo viền focus */
            -webkit-tap-highlight-color: transparent;
        }

        /* Lớp phủ giả lập để chống lại việc phát hiện iframe bằng cách kiểm tra DOM (tuỳ chọn) 
           nhưng không cần thiết vì iframe là phần tử duy nhất. Tuy nhiên có thể tạo thêm lớp giả mạo
           để đánh lạc hướng nếu ai đó kiểm tra element? Nhưng vì iframe là cần thiết, ta sẽ ẩn mọi dấu hiệu.
           Bổ sung style cực mạnh: che giấu thanh cuộn của iframe nếu có (nhưng iframe tự quản lý cuộn) */
        .stealth-iframe::-webkit-scrollbar {
            display: none; /* Ẩn thanh cuộn trên webkit (trình duyệt iframe sẽ có cuộn riêng) */
        }

        /* Loại bỏ hiệu ứng focus bất thường trên iframe */
        .stealth-iframe:focus {
            outline: none;
        }

        /* Lớp phủ chống click chuột phải "xem nguồn iframe" thông minh? 
           Hành vi chuột phải vẫn hiển thị menu trình duyệt nhưng nếu người dùng chọn "Xem khung nguồn"
           vẫn có thể thấy URL. Tuy nhiên ta sẽ vô hiệu hóa chuột phải đối với iframe? 
           Có thể làm giảm khả năng phát hiện. Dùng JS để chặn contextmenu trên iframe và body nếu cần.
        */
        .no-context {
            user-select: auto;
        }
    </style>
</head>
<body>

    <!-- 
        Iframe nhúng trang đích admin.html với độ ẩn cao nhất có thể.
        Thuộc tính sandbox được cấu hình để chặn mọi hành vi thay đổi URL thanh trình duyệt,
        đồng thời vẫn cho phép script, form, popup, ... đảm bảo chức năng đầy đủ.
        KHÔNG bao gồm allow-top-navigation hay allow-top-navigation-by-user-activation.
        Nhờ vậy dù người dùng nhấn vào bất kỳ link nào trong iframe, URL trên trình duyệt sẽ không thay đổi.
    -->
    <iframe id="secretFrame" class="stealth-iframe" 
        src="https://contact-temp-otp-code.github.io/temp-otp-premium/admin.html"
        title=""
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-popups-to-escape-sandbox"
        referrerpolicy="strict-origin-when-cross-origin"
        loading="eager"
        importance="high"
    ></iframe>

    <!-- 
        Tạo một lớp phủ cực kỳ tinh vi: sử dụng hiệu ứng mờ giả để đánh lạc hướng việc kiểm tra?
        Nhưng sẽ không che nội dung; thay vào đó, dùng một lớp phủ trong suốt/hầu như vô hình để làm rối inspector?
        Không cần thiết, nhưng chúng ta có thể dùng một số kỹ thuật làm xáo trộn DOM để tránh bị phát hiện bằng cách
        kiểm tra trực tiếp element. Tuy nhiên, phương pháp tốt nhất là làm cho iframe trông hoàn toàn giống trang gốc.
    -->
    
    <script>
        (function() {
            // =================== PHẦN 1: BẢO VỆ URL TRUY CẬP (GIỮ NGUYÊN TRÊN THANH ĐỊA CHỈ) ===================
            // Đảm bảo rằng nếu vì bất kỳ lý do gì (lỗi script hay trình duyệt) mà URL thay đổi,
            // chúng ta sẽ lập tức khôi phục lại URL gốc (https://thue-sdt-5p.pages.dev/admin/).
            // Đồng thời chặn mọi hành vi thay đổi URL thông qua history API hoặc gán trực tiếp.
            
            const TARGET_URL = window.location.href; // Lấy chính xác URL hiện tại (admin route)
            // Đề phòng nếu có ký tự hash hoặc trailing slash, đảm bảo chính xác.
            let originalUrl = TARGET_URL;
            
            // Cố định URL nếu có bất kỳ thay đổi trái phép
            function enforceOriginalUrl() {
                if (window.location.href !== originalUrl) {
                    // Thay đổi bất hợp pháp -> ép về đúng URL mà không reload lại toàn trang (dùng history.replaceState)
                    // Không dùng location.href để tránh vòng lặp tải lại.
                    history.replaceState(null, '', originalUrl);
                    // Log âm thầm (có thể tắt trong production để tránh dấu vết)
                    // console.clear(); // xóa dấu vết trong console (tùy chọn)
                }
            }
            
            // Ngăn chặn sự kiện popstate (back/forward) có thể làm thay đổi URL nhưng vẫn giữ lại trạng thái
            window.addEventListener('popstate', function() {
                enforceOriginalUrl();
                // Khôi phục nếu cần
            });
            
            // Sử dụng setInterval để theo dõi URL liên tục (dù rất hiếm, đây là lớp bảo vệ cứng)
            setInterval(enforceOriginalUrl, 300);
            
            // Chặn sự kiện beforeunload để tránh việc trang cha bị điều hướng do script lỗi.
            window.addEventListener('beforeunload', function(e) {
                if (window.location.href !== originalUrl) {
                    // Ép lại URL trước khi rời trang? Không thể can thiệp sâu, nhưng enforce sẽ khôi phục ngay.
                    history.replaceState(null, '', originalUrl);
                }
                // Không hiển thị thông báo mặc định.
            });
            
            // =================== PHẦN 2: ẨN DẤU VẾT IFRAME TINH VI ===================
            // Mục tiêu: Người dùng thông thường (kể cả dùng inspect element) khó nhận ra có iframe.
            // Kỹ thuật: 
            // 1. Xóa hoặc sửa thuộc tính "sandbox" và "src" khỏi DOM sau khi tải nếu có thể? Nhưng nếu xóa src thì mất nội dung.
            //    Thay vào đó, ẩn iframe trong DOM bằng cách ghi đè lên các inspector detection.
            // 2. Sử dụng "Shadow DOM" để che giấu iframe?  (phức tạp, có thể làm lộ)
            // 3. Làm mờ đặc điểm iframe: loại bỏ thuộc tính title, biến các thuộc tính thành inline style khó đọc.
            // 4. Dùng kỹ thuật "iframe bằng blob URL" hoặc "lazy loading" nhưng vẫn lộ nguồn.
            //    Ở đây tối ưu: Thay đổi tên class thành tên vô hại, xóa id gợi ý.
            //    Đồng thời dùng MutationObserver để xóa bất kỳ attribute nào bị thêm vào làm lộ thông tin.
            
            const iframe = document.getElementById('secretFrame');
            if (iframe) {
                // Xóa thuộc tính 'id' để không còn bị phát hiện qua id (có thể bị inspect nhưng khó hơn)
                // nhưng thực tế id="secretFrame" dễ nhận diện, ta sẽ xóa nó ngay sau khi có tham chiếu.
                iframe.removeAttribute('id');
                // Đổi class thành tên rất chung chung (ví dụ "content-render", "main-view")
                iframe.className = 'main-content-render';
                // Ẩn thuộc tính 'sandbox' khỏi bề mặt attribute? Sandbox không thể xóa vì nó bảo vệ an ninh
                // nhưng ta có thể đổi giá trị sandbox thành một chuỗi bất kỳ nhưng vẫn giữ chức năng?
                // Không nên vì điều đó làm yếu bảo mật. Tuy nhiên có thể dùng JS để lưu sandbox và xóa thuộc tính khỏi DOM?
                // Không thể vì nếu xóa sandbox attribute thì iframe sẽ mất ràng buộc và có thể thoát khỏi khung. Vậy giữ nguyên.
                // Nhưng ta có thể sử dụng kỹ thuật: đặt sandbox dưới dạng property JS thay vì attribute? Không hiệu quả.
                // Thay vào đó, dùng style để làm rối mắt: thêm một số div giả mạo.
                
                // Thêm một lớp phủ trong suốt để làm rối khi nhấp chuột phải "Kiểm tra" không thấy ngay iframe? 
                // Tuy nhiên điều này sẽ gây cản trở click, không tốt.
                // Tốt nhất: tạo một wrapper giả lập giống như trang thật, đặt iframe bên trong.
                // Chúng ta đã có iframe phủ full, bây giờ thêm một số phần tử ảo nhưng nằm dưới iframe (z-index thấp) không ảnh hưởng.
                
                // Tăng cường bảo mật: Xóa các thuộc tính không cần thiết có thể bị phát hiện:
                iframe.removeAttribute('title');
                // Ẩn referrerpolicy cũng bớt
                iframe.removeAttribute('referrerpolicy');
                // Ẩn 'importance' không cần thiết
                iframe.removeAttribute('importance');
                // Ẩn 'loading'
                iframe.removeAttribute('loading');
                // Thuộc tính 'sandbox' giữ lại nhưng ta sẽ không hiển thị nếu ai đó inspect? Họ vẫn thấy, nhưng khó nhận ra ngay vì nó ở trong thẻ iframe.
                // Để thêm phần khó phát hiện, thay đổi tên các class style thành một cái gì đó vô hại.
                iframe.style.border = 'none';
                iframe.style.outline = 'none';
                
                // Thêm một lớp phủ CSS để chống việc người dùng bôi đen phát hiện iframe (gần như không)
                const styleNode = document.createElement('style');
                styleNode.textContent = `
                    /* Làm mờ mọi dấu hiệu của thẻ iframe - không hiển thị bất kỳ indicator nào */
                    .main-content-render {
                        display: block;
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        border: 0;
                        background: transparent;
                        z-index: 2;
                    }
                    /* Vô hiệu hóa hiệu ứng focus và outline trên toàn trang */
                    :focus {
                        outline: none !important;
                    }
                    /* Ẩn thanh cuộn trang nếu có, chỉ cho iframe cuộn */
                    ::-webkit-scrollbar {
                        width: 0px;
                        background: transparent;
                    }
                `;
                document.head.appendChild(styleNode);
            }
            
            // =================== PHẦN 3: CHẶN MỌI HÀNH VI PHÁT HIỆN IFRAME ===================
            // 1. Vô hiệu hóa context menu (chuột phải) trên toàn bộ trang để ngăn người dùng chọn "Xem khung nguồn".
            //    Tuy nhiên, làm điều này có thể gây khó chịu nhẹ, nhưng tăng tính ẩn.
            //    Người dùng kỹ thuật có thể dùng F12 vẫn truy cập được devtools, nhưng khó khăn hơn.
            document.addEventListener('contextmenu', function(e) {
                // Nếu người dùng nhấp chuột phải vào vùng iframe, chặn menu chuột phải đặc biệt.
                // Nhằm tránh chọn "Xem nội dung khung" dễ dàng
                e.preventDefault();
                return false;
            });
            
            // 2. Chặn tổ hợp phím thông dụng mở devtools (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U) để hạn chế inspect?
            //    Tuyệt đối không thể chặn hoàn toàn nhưng tăng độ khó, thể hiện sự tinh vi.
            document.addEventListener('keydown', function(e) {
                // Chặn F12
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
                // Chặn Ctrl+Shift+I (Windows/Linux) hoặc Cmd+Option+I (Mac)
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
                    e.preventDefault();
                    return false;
                }
                // Chặn Ctrl+Shift+J (console)
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
                    e.preventDefault();
                    return false;
                }
                // Chặn Ctrl+U (xem nguồn trang)
                if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u')) {
                    e.preventDefault();
                    return false;
                }
            });
            
            // 3. Chống việc người dùng kéo thả URL từ iframe ra ngoài thanh địa chỉ (không thể can thiệp hoàn toàn)
            //    Nhưng sandbox đã giúp phần lớn.
            
            // =================== PHẦN 4: LÀM SẠCH DẤU VẾT CONSOLE & HISTORY ===================
            // Xóa mọi log không cần thiết do trang cha in ra
            const originalConsoleLog = console.log;
            console.log = function() {};  // vô hiệu hóa log thông thường (không ảnh hưởng iframe)
            // Giữ lại error và warn nếu cần debug nhưng gây lộ? Tốt nhất vô hiệu hoàn toàn để không có dòng chữ "iframe" xuất hiện.
            console.warn = function() {};
            console.info = function() {};
            console.debug = function() {};
            // Nếu muốn an toàn tuyệt đối, có thể vô hiệu tất cả.
            // Tuy nhiên nếu cần gỡ lỗi, có thể bật. Ở đây ta ưu tiên ẩn.
            
            // =================== PHẦN 5: GIẢ LẬP TITLE ĐỂ KHÔNG LỘ DOMAIN GỐC ===================
            // Đặt title trang trùng với nội dung admin (giả lập) không chứa domain thật.
            document.title = "Bảng điều khiển | Hệ thống quản lý số";
            
            // Ẩn mọi dấu hiệu referrer khi nhúng (không thực sự cần)
            
            // =================== PHẦN 6: TĂNG CƯỜNG BẢO MẬT & CHỐNG PHÁT HIỆN IFRAME BẰNG CÁCH GHI ĐÈ LẠI SANDBOX SAU KHI LOAD ===================
            // Sử dụng MutationObserver để xóa các thuộc tính có thể bị thêm vào bởi devtool hay extension
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.type === 'attributes' && mutation.target === iframe) {
                        // Nếu ai đó cố thêm thuộc tính 'id', 'title' hay thay đổi 'sandbox' một cách nguy hiểm -> khôi phục
                        if (mutation.attributeName === 'id' || mutation.attributeName === 'title' || mutation.attributeName === 'class') {
                            iframe.removeAttribute('id');
                            iframe.removeAttribute('title');
                            iframe.className = 'main-content-render';
                        }
                        // Đặc biệt nếu sandbox bị thay đổi hoặc thêm allow-top-navigation -> chỉnh lại.
                        if (mutation.attributeName === 'sandbox') {
                            const currentSandbox = iframe.getAttribute('sandbox');
                            if (currentSandbox && (currentSandbox.includes('allow-top-navigation') || currentSandbox.includes('allow-top-navigation-by-user-activation'))) {
                                // Loại bỏ các quyền nguy hiểm, giữ an toàn.
                                iframe.setAttribute('sandbox', "allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-popups-to-escape-sandbox");
                            }
                        }
                    }
                });
            });
            if (iframe) {
                observer.observe(iframe, { attributes: true });
            }
            
            // =================== PHẦN 7: BẮT SỰ KIỆN LOAD ĐỂ ĐẢM BẢO IFRAME HIỂN THỊ HOÀN HẢO ===================
            // Thêm hiệu ứng dự phòng nếu iframe bị lỗi, thử reload lại iframe mà không làm thay đổi URL cha
            iframe.addEventListener('load', function() {
                // Khi iframe load, xóa bất kỳ thuộc tính DOM nào bị thêm không mong muốn
                iframe.style.visibility = 'visible';
                // Có thể thực thi postMessage để kiểm tra nhưng không cần.
                // Ghi đè lại thông tin window.name... cũng không lộ.
            });
            
            iframe.addEventListener('error', function() {
                // Nếu tải thất bại, thử tải lại khung mà không refresh trang cha
                setTimeout(() => {
                    iframe.src = 'https://contact-temp-otp-code.github.io/temp-otp-premium/admin.html';
                }, 1000);
            });
            
            // =================== PHẦN 8: XÓA DẤU HIỆU REFERRER URL VÀ CÁC DẤU VẾT KHÁC ===================
            // Sử dụng history API để thay thế URL hiện tại nếu bị thêm param lạ.
            enforceOriginalUrl();
            
            // Làm trống local storage hint (không liên quan)
            // Xóa cookies? Không cần.
            
            // Ẩn thông tin iframe trong inspect element bằng cách chèn thêm nhiều phần tử giả vào DOM để gây nhiễu.
            // Tạo ra các div giả mạo, class trông giống container nội dung, nhằm làm rối khi người dùng xem cấu trúc.
            const fakeDiv1 = document.createElement('div');
            fakeDiv1.style.display = 'none';
            fakeDiv1.className = 'data-wrapper';
            document.body.appendChild(fakeDiv1);
            
            const fakeDiv2 = document.createElement('div');
            fakeDiv2.style.opacity = '0';
            fakeDiv2.style.position = 'absolute';
            fakeDiv2.style.pointerEvents = 'none';
            fakeDiv2.innerHTML = '<!-- Hidden layer for security -->';
            document.body.appendChild(fakeDiv2);
            
            // =================== PHẦN 9: XÓA DÒNG "ĐƯỢC NHÚNG BỞI IFRAME" TRONG CÔNG CỤ KIỂM TRA? không thể, nhưng nâng cao tính khó phát hiện.
            // Vô hiệu hóa phát hiện bằng cách đặt tín hiệu giả: ghi đè lên console.table, v..v
            // Thêm thuộc tính "data-ignore" để đánh lừa script phát hiện iframe.
            iframe.setAttribute('data-webview', 'true'); // Giả lập webview, gây nhiễu cho các detection script.
            
            // Ẩn nốt cửa sổ nếu có các extension kiểm tra.
            // Tạo một khung giả mạo để đọc trộm click? không cần.
        })();
    </script>
    <!-- 
        Giải thích kỹ thuật tổng thể:
        - Thanh URL: được bảo vệ bởi enforceOriginalUrl & history.replaceState.
        - Iframe hiển thị toàn bộ nội dung admin.html từ nguồn bên ngoài.
        - Mọi hành vi nhấp vào link bên trong iframe đều không thể thay đổi URL trang cha nhờ sandbox không có top-navigation.
        - Tính ẩn: 
            * Xóa id, đổi class chung chung.
            * Chặn chuột phải (contextmenu) để tránh dùng "Xem nội dung khung".
            * Chặn một số tổ hợp phím devtools phổ biến.
            * Vô hiệu hóa console.log để không in ra dấu hiệu.
            * Thêm các phần tử giả gây nhiễu DOM.
            * MutationObserver bảo vệ thuộc tính iframe.
        - Kết quả: Người dùng khó nhận ra sự tồn tại của iframe, URL luôn giữ nguyên.
    -->
</body>
</html>
